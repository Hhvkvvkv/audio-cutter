name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "build-tools;34.0.0" 2>&1 | tail -5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix gradle.properties for CI
        run: |
          # إزالة aapt2 override المخصص للبيئة المحلية (ARM64) لأنه لا يعمل على GitHub Actions (x86_64)
          sed -i 's/^android.aapt2FromMavenOverride=/# android.aapt2FromMavenOverride=/' gradle.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK with debug key
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          $ANDROID_HOME/build-tools/36.0.0/apksigner sign --ks debug.keystore \
            --ks-pass pass:android --ks-key-alias androiddebugkey \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-signed.apk
